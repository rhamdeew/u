{{define "title"}}Edit {{.Link.Keyword}} — u.{{end}}

{{define "header-right"}}
<div class="header-right">
  <nav class="header-nav">
    <a href="/admin" class="btn btn-ghost btn-sm">Links</a>
    <a href="/admin/dashboard" class="btn btn-ghost btn-sm">Dashboard</a>
    <a href="/admin/categories" class="btn btn-ghost btn-sm">Categories</a>
  </nav>
  <form method="POST" action="/admin/logout">
    <button type="submit" class="btn btn-ghost">Logout</button>
  </form>
</div>
{{end}}

{{define "content"}}
{{if .Flash.Message}}
<p class="flash flash-{{.Flash.Kind}}">{{.Flash.Message}}</p>
{{end}}

<section class="card">
  <h2>Edit link</h2>
  <form method="POST" action="/admin/links/{{.Link.Keyword}}/edit" class="add-form">
    <label>
      <span>Short keyword</span>
      <input type="text" name="keyword" value="{{.Link.Keyword}}">
    </label>
    <label>
      <span>Destination URL</span>
      <input type="url" name="url" value="{{.Link.URL}}" required>
    </label>
    <label>
      <span>Title</span>
      <input type="text" name="title" value="{{.Link.Title}}">
    </label>
    {{if .Categories}}
    <label>
      <span>Category</span>
      <select name="category" class="add-form-select">
        <option value="0">— no category —</option>
        {{range .Categories}}
        <option value="{{.ID}}" {{if eq $.Link.CategoryID .ID}}selected{{end}}>{{.Name}}</option>
        {{end}}
      </select>
    </label>
    {{end}}
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="/admin" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</section>
{{end}}
